# Alembic configuration for the AgentScope SQL storage backend.
#
# Pointed at the private env / template shipped inside the package so
# users don't need to bootstrap Alembic themselves — just:
#
#     AGENTSCOPE_SQL_URL="sqlite+aiosqlite:///./as.db" \
#     alembic -c src/agentscope/app/storage/_sql/_alembic/alembic.ini upgrade head
#
# In production you should copy this file next to your deployment
# config and point ``script_location`` / ``sqlalchemy.url`` at your
# checkout.
[alembic]
script_location = %(here)s
# Empty by default — set via -x url=... or the AGENTSCOPE_SQL_URL env var.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

