name: qwen3.5-omni-plus
label: Qwen3.5-Omni-Plus
status: active

input_types:
  - text/plain
  - image/bmp
  - image/jpeg
  - image/png
  - image/tiff
  - image/webp
  - image/heic
  - audio/mp3
  - audio/wav
  - audio/flac
  - video/mp4

output_types:
  - text/plain
  - application/x-thinking
  - audio/wav

context_size: 262144
output_size: 65536

parameter_overrides:
  max_tokens:
    maximum: 65536
  # Voices supported by the Qwen3.5-Omni / Qwen3.5-Omni-Realtime family
  # (default: Tina). Source: https://help.aliyun.com/zh/model-studio/omni-voice-list
  audio:
    properties:
      voice:
        enum:
          - Tina
          - Cindy
          - Liora Mira
          - Sunnybobi
          - Raymond
          - Ethan
          - Theo Calm
          - Serena
          - Harvey
          - Maia
          - Evan
          - Qiao
          - Momo
          - Wil
          - Angel
          - Li Cassian
          - Mia
          - Joyner
          - Gold
          - Katerina
          - Ryan
          - Jennifer
          - Aiden
          - Mione
          - Sunny
          - Dylan
          - Eric
          - Peter
          - Joseph Chen
          - Marcus
          - Li
          - Kiki
          - Rocky
          - Sohee
          - Lenn
          - Ono Anna
          - Sonrisa
          - Bodega
          - Emilien
          - Andre
          - Radio Gol
          - Alek
          - Rizky
          - Roya
          - Arda
          - Hana
          - Dolce
          - Jakub
          - Griet
          - Eliška
          - Marina
          - Siiri
          - Ingrid
          - Sigga
          - Bea
          - Chloe
      # Qwen omni streaming delivers raw PCM upstream regardless of the
      # requested ``format``; the model wraps it as WAV before yielding to
      # consumers, so this is the only format we expose here.
      format:
        enum:
          - pcm16
        default: pcm16

