type: realtime_model
name: gpt-realtime
label: GPT Realtime
status: active

input_types:
  - audio/pcm
  - text/plain

output_types:
  - audio/pcm
  - text/plain

context_size: 128000
output_size: 4096

parameter_overrides:
  voice:
    enum: ["alloy", "echo", "marin", "cedar"]
  enable_input_audio_transcription:
    hidden: true
  input_transcription_model:
    hidden: true
  input_transcription_language:
    title: "语音识别语言"
    description: "语音识别的语言提示 (如 'zh' 中文, 'en' 英语)。留空为自动检测。"
